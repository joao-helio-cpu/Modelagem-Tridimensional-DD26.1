<html>
<head>
  <title>Projeto final de Modelagem Tridimensional</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0px; overflow: hidden">
  <a-scene vr-mode-ui="enable: false" embedded arjs="sourceType: webcam; debugUIEnabled: false;">
    <a-assets timeout="10000">
      <a-asset-item id="mesa" src="mesa_atualizada_3d.glb"></a-asset-item>
    </a-assets>

    <a-marker type="pattern" url="pattern-TagMesa.patt">
      <a-entity gltf-model="#mesa" position="0 0 0" scale="0.5 0.5 0.5" rotation="0 0 0"></a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
